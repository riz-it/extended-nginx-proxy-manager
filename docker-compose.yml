version: "3.8"

services:
  npm-lb:
    build: .
    image: ${CI_REGISTRY_IMAGE:-npm-lb:latest}
    container_name: npm-lb
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP
      - "81:81"       # NPM Admin UI
      - "443:443"     # HTTPS
      - "3000:3001"   # Host 3000 -> Custom LB API (3001)
    volumes:
      - /home/pusim/proxy/config/data:/data
      - /home/pusim/proxy/config/letsencrypt:/etc/letsencrypt
    environment:
      - TZ=Asia/Jakarta
      
      # ========================================================
      # DATABASE CONFIGURATION (Supports sqlite, mysql, postgresql)
      # ========================================================
      # Uncomment DB_TYPE and change to mysql or sqlite. (default: postgresql)
      # - DB_TYPE=sqlite
      
      # Required for PostgreSQL or MySQL
      - DB_HOST=${DB_HOST:-${POSTGRES_HOST}}
      - DB_PORT=${DB_PORT:-${POSTGRES_PORT:-5432}}
      - DB_USER=${DB_USER:-${POSTGRES_USER}}
      - DB_PASSWORD=${DB_PASSWORD:-${POSTGRES_PASSWORD}}
      - DB_NAME=${DB_NAME:-${POSTGRES_DB}}
      
      # Legacy Nginx Proxy Manager environment variables
      - DB_POSTGRES_HOST=${DB_HOST:-${POSTGRES_HOST}}
      - DB_POSTGRES_PORT=${DB_PORT:-${POSTGRES_PORT:-5432}}
      - DB_POSTGRES_USER=${DB_USER:-${POSTGRES_USER}}
      - DB_POSTGRES_PASSWORD=${DB_PASSWORD:-${POSTGRES_PASSWORD}}
      - DB_POSTGRES_NAME=${DB_NAME:-${POSTGRES_DB}}

      # App Specific Config
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
