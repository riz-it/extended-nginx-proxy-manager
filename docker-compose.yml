version: "3.8"

services:
  npm-lb:
    build: .
    image: ${CI_REGISTRY_IMAGE:-npm-lb:latest}
    container_name: npm-lb
    restart: unless-stopped
    ports:
      - "80:80"       # HTTP
      - "81:81"       # NPM Admin UI
      - "443:443"     # HTTPS
      - "3000:3001"   # Host 3000 -> Custom LB API (3001)
    volumes:
      - ./config/data:/data
      - ./config/letsencrypt:/etc/letsencrypt
    environment:
      - TZ=Asia/Jakarta
      # Nginx Proxy Manager Postgres Config
      - DB_POSTGRES_HOST=${POSTGRES_HOST}
      - DB_POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - DB_POSTGRES_USER=${POSTGRES_USER}
      - DB_POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - DB_POSTGRES_NAME=${POSTGRES_DB}
      # Custom API Postgres Config (used by startScript.sh)
      - POSTGRES_HOST=${POSTGRES_HOST}
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
      # App Specific Config
      - PORT=3001
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
