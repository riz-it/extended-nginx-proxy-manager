production:
  stage: deploy
  tags:
    - production
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - cp $ENV_FILE .env
    - docker compose pull
    - docker compose up -d --remove-orphans
  environment:
    name: production

  variables:
    CI_REGISTRY_IMAGE: $CI_REGISTRY_IMAGE
  only:
    - main
