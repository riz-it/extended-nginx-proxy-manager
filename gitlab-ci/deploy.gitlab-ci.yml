.deploy_template:
  stage: deploy
  script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login $CI_REGISTRY -u $CI_REGISTRY_USER --password-stdin
    - cp "$PROXY_ENV_PRODUCTION" .env
    - docker compose pull
    - docker compose up -d --remove-orphans
  variables:
    CI_REGISTRY_IMAGE: $CI_REGISTRY_IMAGE
  only:
    - main

deploy-proxy-colo:
  extends: .deploy_template
  tags:
    - proxy-colo
  environment:
    name: production/proxy-colo

deploy-proxy-onprem:
  extends: .deploy_template
  tags:
    - proxy-onprem
  environment:
    name: production/proxy-onprem
  needs:
    - deploy-proxy-colo
